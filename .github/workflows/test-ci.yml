name: CI - Tests

on:
    push:
        branches: 
            - main
    pull_request:
        branches: 
            - main

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                java-version: '19'
                distribution: 'corretto'

            - name: Run tests
              run: |
                chmod +x ./gradlew
                ./gradlew test