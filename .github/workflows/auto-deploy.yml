name: CI/CD - Build & Deploy

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '19'

      - name: Compute version
        id: ver
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          PATCH=$(git rev-list v$TAG..HEAD --count)
          VERSION=$TAG.$PATCH
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Print version
        run: echo "Deploy version ${{ steps.ver.outputs.version }}"

      - name: Build and rename JAR
        run: |
            chmod +x ./gradlew
            ./gradlew clean bootJar -x test
            cp build/libs/app.jar application.jar

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APPLICATION_NAME }}
          environment_name: ${{ secrets.EB_ENVIRONMENT_NAME }}
          region: ${{ secrets.AWS_REGION }}
          version_label: ${{ steps.ver.outputs.version }}
          deployment_package: application.jar